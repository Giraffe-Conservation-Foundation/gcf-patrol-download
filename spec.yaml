id: gcf_patrol_download

requirements:
  - name: ecoscope-platform
    version: ">=2.11.14, <2.12.0"
    channel: https://repo.prefix.dev/ecoscope-workflows/
  - name: ecoscope-workflows-ext-custom
    version: ">=0.1.0rc14"
    channel: https://repo.prefix.dev/ecoscope-workflows-custom/
  # Once ecoscope-workflows-ext-gcf is published to a conda channel, replace
  # ext-custom above with:
  #   - name: ecoscope-workflows-ext-gcf
  #     version: ">=0.1.0"
  #     channel: https://repo.prefix.dev/ecoscope-workflows-gcf/

rjsf-overrides:
  properties:
    Patrol and Event Types.properties.er_patrol_and_events_params.properties.patrol_types.description: >-
      Specify the patrol type(s) to download. Enter the VALUE (not display name) for each
      patrol type — one per field (e.g. "ecoscope_patrol"). Values can be found in EarthRanger
      Admin under Activity → Patrol Types. Leave empty to include all patrol types.
    Patrol and Event Types.properties.er_patrol_and_events_params.properties.event_types.description: >-
      Specify the event type(s) to include (optional). Enter the VALUE for each event type
      (e.g. "wildlife_sighting_rep"). Values can be found in EarthRanger Admin under
      Activity → Event Types. Leave empty to include all event types.

    persist_patrol_traj.properties.filename_prefix.default: "patrol_trajectories"
    persist_patrol_traj.properties.filetypes.default: ["parquet"]
    persist_patrol_traj.properties.filetypes.description: >-
      Parquet preserves geometry and is recommended for spatial analysis in GIS tools.

    persist_patrol_events.properties.filename_prefix.default: "patrol_events"
    persist_patrol_events.properties.filetypes.default: ["csv"]
    persist_patrol_events.properties.filetypes.items.enum: ["csv", "parquet"]
    persist_patrol_events.properties.filetypes.description: >-
      CSV opens directly in Excel. Parquet preserves geometry and is recommended for
      spatial analysis.

    Process Patrol Events.properties.process_event_columns.properties.drop_columns.default:
      - level_8
      - index
      - location
      - reported_by
      - event_details
      - geojson
      - attributes
      - notes
      - patrols
      - patrol_segments
      - is_contained_in
      - related_subjects
      - location_lat
      - location_lon
      - message
      - provenance
      - event_category
      - priority_label
      - comment
      - end_time
      - sort_at
      - icon_id
      - url
      - image_url
      - external_source
    Process Patrol Events.properties.process_event_columns.properties.drop_columns.description: >-
      Columns to remove from the patrol events export. Defaults match the GCF Twiga Tools
      Event Download page. Adjust as needed.

    Process Patrol Observations.properties.groupers.properties.groupers.items.anyOf:
      - {"$ref": "#/$defs/ValueGrouper"}
      - {"$ref": "#/$defs/TemporalGrouper"}
    Process Patrol Observations.properties.groupers.properties.groupers.default:
      - index_name: "patrol_serial_number"

    Generate Maps.properties.set_skip_map.properties.var.description: >-
      Skip generating maps. Recommended for large datasets to improve performance.
    Generate Maps.properties.set_skip_map.properties.var.default: true

  $defs:
    ValueGrouper:
      title: "Category"
      type: "object"
      properties:
        index_name:
          title: "Index Name"
          type: "string"
          oneOf:
            - const: "patrol_serial_number"
              title: "Patrol Serial Number"
            - const: "patrol_type"
              title: "Patrol Type"
            - const: "patrol_subject"
              title: "Patrol Subject"

  uiSchema:
    Process Patrol Observations.filter_patrol_obs.filter_point_coords.items.ui:options.label: false
    Process Patrol Events.filter_patrol_events.filter_point_coords.items.ui:options.label: false
    Generate Maps.base_map_defs.base_maps.items.ui:options.label: false

task-instance-defaults:
  skipif:
    conditions:
      - any_is_empty_df
      - any_dependency_skipped

workflow:

  - name: Workflow Details
    id: workflow_details
    task: set_workflow_details

  - name: Data Source
    id: er_client_name
    task: set_er_connection

  - name: Time Range
    id: time_range
    task: set_time_range
    partial:
      time_format: "%d %b %Y %H:%M:%S %Z"

  - name: Extract Timezone Selection
    id: get_timezone
    task: get_timezone_from_time_range
    partial:
      time_range: ${{ workflow.time_range.return }}

  - title: Patrol and Event Types
    type: task-group
    description: >-
      Fetch patrols and their associated events. Filter by patrol type and/or event type.
      Leave filters empty to include all types.
    tasks:

      - name: Set Patrol and Event Parameters
        id: er_patrol_and_events_params
        task: set_patrols_and_patrol_events_params
        partial:
          client: ${{ workflow.er_client_name.return }}
          time_range: ${{ workflow.time_range.return }}
          include_patrol_details: true
          raise_on_empty: false
          truncate_to_time_range: true
          sub_page_size: 100

      - name: Fetch Patrols
        id: prefetch_patrols
        task: get_patrols_from_combined_params
        partial:
          combined_params: ${{ workflow.er_patrol_and_events_params.return }}

      - name: Fetch Patrol Observations
        id: patrol_obs
        task: get_patrol_observations_from_patrols_df_and_combined_params
        partial:
          patrols_df: ${{ workflow.prefetch_patrols.return }}
          combined_params: ${{ workflow.er_patrol_and_events_params.return }}

      - name: Fetch Patrol Events
        id: patrol_events_raw
        task: unpack_events_from_patrols_df_and_combined_params
        partial:
          patrols_df: ${{ workflow.prefetch_patrols.return }}
          combined_params: ${{ workflow.er_patrol_and_events_params.return }}

  - name: Convert Patrol Observations to Timezone
    id: convert_obs_to_user_timezone
    task: convert_values_to_timezone
    partial:
      df: ${{ workflow.patrol_obs.return }}
      timezone: ${{ workflow.get_timezone.return }}
      columns: ["fixtime"]
      auto_detect: false

  - name: Convert Patrol Events to Timezone
    id: convert_events_to_user_timezone
    task: convert_values_to_timezone
    partial:
      df: ${{ workflow.patrol_events_raw.return }}
      timezone: ${{ workflow.get_timezone.return }}
      columns: ["time"]
      auto_detect: false

  - title: Process Patrol Observations
    type: task-group
    description: >-
      Filter and process patrol GPS observations, then convert to trajectory LineStrings.
    tasks:

      - name: Remove Extra__ Column Prefix
        id: drop_extra_prefix_obs
        task: drop_column_prefix
        partial:
          df: ${{ workflow.convert_obs_to_user_timezone.return }}
          prefix: "extra__"
          duplicate_strategy: "suffix"

      - name: Filter Observation Relocations
        id: filter_patrol_obs
        task: apply_reloc_coord_filter
        partial:
          df: ${{ workflow.drop_extra_prefix_obs.return }}
          roi_gdf: null
          roi_name: null
          reset_index: false
          bounding_box:
            min_x: -180.0
            max_x: 180.0
            min_y: -90.0
            max_y: 90.0
          filter_point_coords:
            - {x: 180.0, y: 90.0}
            - {x: 0.0, y: 0.0}
            - {x: 1.0, y: 1.0}

      - name: Convert Observations to Trajectories
        id: patrol_traj
        task: relocations_to_trajectory
        partial:
          relocations: ${{ workflow.filter_patrol_obs.return }}

      - name: Remove Extra__ Column Prefix from Trajectories
        id: drop_extra_prefix_traj
        task: drop_column_prefix
        partial:
          df: ${{ workflow.patrol_traj.return }}
          prefix: "extra__"
          duplicate_strategy: "suffix"

      - name: Clean Up Trajectory Columns
        id: customize_columns_traj
        task: map_columns
        partial:
          df: ${{ workflow.drop_extra_prefix_traj.return }}
          rename_columns: {}
          drop_columns: ["id"]
          retain_columns: []
          raise_if_not_found: false

      - name: Apply SQL Query to Trajectories
        id: sql_query_traj
        task: apply_sql_query
        partial:
          df: ${{ workflow.customize_columns_traj.return }}

      - name: Group Data
        id: groupers
        task: set_groupers

      - name: Style Trajectory by Category
        id: set_patrol_traj_color_column
        task: set_string_var
        partial:
          var: "patrol_subject"

      - name: Add Temporal Index to Trajectories
        id: traj_add_temporal_index
        task: add_temporal_index
        partial:
          df: ${{ workflow.sql_query_traj.return }}
          time_col: "segment_start"
          groupers: ${{ workflow.groupers.return }}
          cast_to_datetime: true
          format: "mixed"

      - name: Rename Grouper Columns for Trajectories
        id: traj_rename_grouper_columns
        task: map_columns
        partial:
          df: ${{ workflow.traj_add_temporal_index.return }}
          drop_columns: ["patrol_type"]
          retain_columns: []
          raise_if_not_found: false
          rename_columns:
            patrol_type__value: "patrol_type"

      - name: Trajectory Colormap
        id: traj_colormap
        task: apply_color_map
        partial:
          df: ${{ workflow.traj_rename_grouper_columns.return }}
          colormap: ["#FF9600", "#F23B0E", "#A100CB", "#F04564", "#03421A", "#3089FF", "#E26FFF", "#8C1700", "#002960", "#FFD000", "#B62879", "#680078", "#005A56", "#0056C7", "#331878", "#E76826"]
          input_column_name: ${{ workflow.set_patrol_traj_color_column.return }}
          output_column_name: "patrol_traj_colormap"

  - title: Process Patrol Events
    type: task-group
    description: >-
      Flatten and clean patrol event data: extract reported_by, normalise event_details
      JSON into flat columns, and apply column filters.
    tasks:

      - name: Remove Extra__ Column Prefix from Events
        id: drop_extra_prefix_events
        task: drop_column_prefix
        partial:
          df: ${{ workflow.convert_events_to_user_timezone.return }}
          prefix: "extra__"
          duplicate_strategy: "suffix"

      - name: Extract reported_by_name from Events
        id: extract_reported_by
        task: extract_value_from_json_column
        partial:
          df: ${{ workflow.drop_extra_prefix_events.return }}
          column_name: "reported_by"
          field_name_options: ["name"]
          output_type: "str"
          output_column_name: "reported_by_name"

      - name: Extract reported_by_subtype from Events
        id: extract_reported_by_subtype
        task: extract_value_from_json_column
        partial:
          df: ${{ workflow.extract_reported_by.return }}
          column_name: "reported_by"
          field_name_options: ["subject_subtype"]
          output_type: "str"
          output_column_name: "reported_by_subtype"

      - name: Process Event Details
        id: process_event_details
        task: process_events_details
        partial:
          df: ${{ workflow.extract_reported_by_subtype.return }}
          client: ${{ workflow.er_client_name.return }}
          map_to_titles: true
          ordered: true

      - name: Normalize Event Details Column
        id: normalize_event_details
        task: normalize_json_column
        partial:
          df: ${{ workflow.process_event_details.return }}
          column: "event_details"
          skip_if_not_exists: true
          sort_columns: false

      - name: Remove event_details__ Column Prefix
        id: drop_event_details_prefix
        task: drop_column_prefix
        partial:
          df: ${{ workflow.normalize_event_details.return }}
          prefix: "event_details__"
          duplicate_strategy: "suffix"

      - name: Convert Event Detail Datetimes to Timezone
        id: convert_event_details_timezone
        task: convert_values_to_timezone
        partial:
          df: ${{ workflow.drop_event_details_prefix.return }}
          timezone: ${{ workflow.get_timezone.return }}
          columns: []
          auto_detect: true

      # ── REPEAT-GROUP FLATTENING ───────────────────────────────────────────────
      # Requires ecoscope-workflows-ext-gcf to be published as a conda package.
      # Setup: see ecoscope-workflows-ext-gcf/.github/workflows/publish.yml
      # Steps to enable:
      #   1. Create prefix.dev channel "ecoscope-workflows-gcf"
      #   2. Add PREFIX_DEV_TOKEN secret to ecoscope-workflows-ext-gcf repo
      #   3. Push a tag (v0.1.0) to ecoscope-workflows-ext-gcf to trigger publish
      #   4. Switch requirements above to use ecoscope-workflows-ext-gcf
      #   5. Uncomment the task below and update filter_patrol_events input
      #
      # - name: Flatten GCF Repeat Groups
      #   id: flatten_repeat_groups
      #   task: flatten_gcf_repeat_groups
      #   partial:
      #     df: ${{ workflow.convert_event_details_timezone.return }}
      # ─────────────────────────────────────────────────────────────────────────

      - name: Apply Coordinate Filter to Patrol Events
        id: filter_patrol_events
        task: apply_reloc_coord_filter
        partial:
          df: ${{ workflow.convert_event_details_timezone.return }}
          # When flatten_repeat_groups is enabled, change the above to:
          # df: ${{ workflow.flatten_repeat_groups.return }}
          roi_gdf: null
          roi_name: null
          reset_index: true

      - name: Preprocess Columns
        id: process_event_columns
        task: map_columns
        partial:
          df: ${{ workflow.filter_patrol_events.return }}
          rename_columns:
            time: event_time
            id: event_id
          retain_columns: []
          raise_if_not_found: false

      - name: Apply SQL Query to Events
        id: sql_query_events
        task: apply_sql_query
        partial:
          df: ${{ workflow.process_event_columns.return }}

      - name: Patrol Events Colormap
        id: pe_colormap
        task: apply_color_map
        partial:
          df: ${{ workflow.sql_query_events.return }}
          input_column_name: "event_type"
          colormap: "tab20b"
          output_column_name: "event_type_colormap"

      - name: Add Temporal Index to Patrol Events
        id: pe_add_temporal_index
        task: add_temporal_index
        partial:
          df: ${{ workflow.pe_colormap.return }}
          time_col: "event_time"
          groupers: ${{ workflow.groupers.return }}
          cast_to_datetime: true
          format: "mixed"

  - name: Cast Patrol Trajectory Columns
    id: patrol_traj_cols_to_string
    task: convert_column_values_to_string
    partial:
      df: ${{ workflow.traj_colormap.return }}
      columns: ["patrol_serial_number", "patrol_type"]

  - name: Cast Patrol Event Columns
    id: pe_cols_to_string
    task: convert_column_values_to_string
    partial:
      df: ${{ workflow.pe_add_temporal_index.return }}
      columns: ["patrol_serial_number", "patrol_type"]

  - name: Split Patrol Trajectories by Group
    id: split_patrol_traj_groups
    task: split_groups
    partial:
      df: ${{ workflow.patrol_traj_cols_to_string.return }}
      groupers: ${{ workflow.groupers.return }}

  - name: Split Patrol Events by Group
    id: split_pe_groups
    task: split_groups
    partial:
      df: ${{ workflow.pe_cols_to_string.return }}
      groupers: ${{ workflow.groupers.return }}

  - name: Persist Patrol Trajectories
    id: persist_patrol_traj
    task: persist_df_wrapper
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      sanitize: true
    mapvalues:
      argnames: df
      argvalues: ${{ workflow.split_patrol_traj_groups.return }}
    skipif:
      conditions:
        - never

  - name: Persist Patrol Events
    id: persist_patrol_events
    task: persist_df_wrapper
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      sanitize: true
    mapvalues:
      argnames: df
      argvalues: ${{ workflow.split_pe_groups.return }}
    skipif:
      conditions:
        - never

  - title: Generate Maps
    type: task-group
    description: >-
      Generate a map showing patrol trajectories and events. Skipped by default —
      enable for smaller datasets.
    tasks:

      - name: Skip Map Generation
        id: set_skip_map
        task: set_bool_var

      - name: ""
        id: skip_traj_map
        task: maybe_skip_df
        partial:
          skip: ${{ workflow.set_skip_map.return }}
        mapvalues:
          argnames: df
          argvalues: ${{ workflow.split_patrol_traj_groups.return }}

      - name: ""
        id: skip_event_map
        task: maybe_skip_df
        partial:
          skip: ${{ workflow.set_skip_map.return }}
        mapvalues:
          argnames: df
          argvalues: ${{ workflow.split_pe_groups.return }}

      - name: Set Patrol Map Title
        id: set_patrol_map_title
        task: set_string_var
        partial:
          var: "Patrol Trajectories and Events Map"

      - name: " "
        id: base_map_defs
        task: set_base_maps

      - name: Rename Trajectory Columns for Display
        id: rename_traj_display_columns
        task: map_columns
        partial:
          drop_columns: []
          retain_columns: []
          raise_if_not_found: false
          rename_columns:
            patrol_serial_number: "Patrol Serial"
            patrol_type: "Patrol Type"
            segment_start: "Start Time"
            timespan_seconds: "Duration (s)"
            speed_kmhr: "Speed (kph)"
        mapvalues:
          argnames: df
          argvalues: ${{ workflow.skip_traj_map.return }}

      - name: Rename Event Columns for Display
        id: rename_event_display_columns
        task: map_columns
        partial:
          drop_columns: []
          retain_columns: []
          raise_if_not_found: false
          rename_columns:
            patrol_serial_number: "Patrol Serial"
            event_type: "Event Type"
            event_time: "Event Time"
            reported_by_name: "Reported By"
        mapvalues:
          argnames: df
          argvalues: ${{ workflow.skip_event_map.return }}

      - name: Create Trajectory Map Layers
        id: patrol_traj_map_layers
        task: create_polyline_layer
        skipif:
          conditions:
            - any_is_empty_df
            - any_dependency_skipped
            - all_geometry_are_none
        partial:
          layer_style:
            get_width: 3
            width_units: "pixels"
            color_column: "patrol_traj_colormap"
          legend:
            label_column: ${{ workflow.set_patrol_traj_color_column.return }}
            color_column: "patrol_traj_colormap"
          tooltip_columns: ["Patrol Serial", "Patrol Type", "Start Time", "Duration (s)", "Speed (kph)"]
        mapvalues:
          argnames: geodataframe
          argvalues: ${{ workflow.rename_traj_display_columns.return }}

      - name: Create Event Map Layers
        id: patrol_events_map_layers
        task: create_point_layer
        skipif:
          conditions:
            - any_is_empty_df
            - any_dependency_skipped
            - all_geometry_are_none
        partial:
          layer_style:
            fill_color_column: "event_type_colormap"
            get_radius: 5
          legend: null
          tooltip_columns: ["Patrol Serial", "Event Type", "Event Time", "Reported By"]
        mapvalues:
          argnames: geodataframe
          argvalues: ${{ workflow.rename_event_display_columns.return }}

      - name: Combine Trajectory and Event Layers
        id: combined_traj_and_pe_map_layers
        task: groupbykey
        skipif:
          conditions:
            - all_keyed_iterables_are_skips
          unpack_depth: 1
        partial:
          iterables:
            - ${{ workflow.patrol_traj_map_layers.return }}
            - ${{ workflow.patrol_events_map_layers.return }}

      - name: Draw Ecomaps
        id: traj_patrol_events_ecomap
        task: draw_ecomap
        partial:
          title: null
          tile_layers: ${{ workflow.base_map_defs.return }}
          north_arrow_style:
            placement: "top-left"
          legend_style:
            title: ${{ workflow.set_patrol_traj_color_column.return }}
            format_title: true
            placement: "bottom-right"
          static: false
          max_zoom: 20
          widget_id: ${{ workflow.set_patrol_map_title.return }}
        mapvalues:
          argnames: geo_layers
          argvalues: ${{ workflow.combined_traj_and_pe_map_layers.return }}

      - name: Persist Ecomaps
        id: traj_pe_ecomap_html_urls
        task: persist_text
        partial:
          root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
        mapvalues:
          argnames: text
          argvalues: ${{ workflow.traj_patrol_events_ecomap.return }}

      - name: Create Ecomap Widgets
        id: traj_pe_map_widgets_single_views
        task: create_map_widget_single_view
        skipif:
          conditions:
            - never
        partial:
          title: ${{ workflow.set_patrol_map_title.return }}
        map:
          argnames: [view, data]
          argvalues: ${{ workflow.traj_pe_ecomap_html_urls.return }}

      - name: Merge Ecomap Views
        id: traj_pe_grouped_map_widget
        task: merge_widget_views
        partial:
          widgets: ${{ workflow.traj_pe_map_widgets_single_views.return }}

  - name: Create Dashboard
    id: patrol_dashboard
    task: gather_dashboard
    partial:
      details: ${{ workflow.workflow_details.return }}
      widgets:
        - ${{ workflow.traj_pe_grouped_map_widget.return }}
      groupers: ${{ workflow.groupers.return }}
      time_range: ${{ workflow.time_range.return }}

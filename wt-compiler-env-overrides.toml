# Workaround: pydeck 0.9.2 is pinned by ecoscope-platform but only available
# on conda.anaconda.org/conda-forge (not on the prefix.dev mirror). Explicitly
# sourcing it from the canonical channel bypasses the strict channel priority
# exclusion that otherwise blocks the solve.
[feature.default.dependencies]
pydeck = { version = "==0.9.2", channel = "https://conda.anaconda.org/conda-forge/" }

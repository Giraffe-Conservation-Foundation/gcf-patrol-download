name: Compile Workflow

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - spec.yaml
      - pixi.toml
      - .github/workflows/compile.yml

jobs:
  compile:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: v0.60.0

      - name: Compile workflow
        run: |
          pixi update --manifest-path pixi.toml
          pixi run --manifest-path pixi.toml wt-compiler compile \
            --spec spec.yaml \
            --pkg-name-prefix=ecoscope-workflows \
            --results-env-var=ECOSCOPE_WORKFLOWS_RESULTS \
            --no-progress --clobber

      - name: Commit compiled output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ecoscope-workflows-gcf-patrol-download-workflow/
          git diff --staged --quiet && echo "Nothing to commit" || \
            (git commit -m "Auto-compile workflow [skip ci]" && git push)
